name: Build Desktop App Matrix

on:
  workflow_dispatch:

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: LazyShell-windows-bundle
            bundle_path: src-tauri/target/release/bundle
          - os: macos-latest
            artifact_name: LazyShell-macos-bundle
            bundle_path: src-tauri/target/release/bundle
          - os: ubuntu-latest
            artifact_name: LazyShell-linux-bundle
            bundle_path: src-tauri/target/release/bundle

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.bundle_path }}/
          if-no-files-found: error
